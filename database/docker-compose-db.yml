# Database Optimisation Enhancement: Local DB Infrastructure
# Service: userauth
# Usage: docker-compose -f database/docker-compose-db.yml up -d
version: '3.8'
services:

  redis:
    image: redis:7.2-alpine
    container_name: redis-userauth
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - db-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-ui-userauth
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - db-network

volumes:
  redis_data:


networks:
  db-network:
    driver: bridge
