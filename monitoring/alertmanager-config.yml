# Monitoring Enhancement: AlertManager Configuration for userauth
global:
  resolve_timeout: 5m
  # SMTP for email alerts (configure with real values)
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@yourcompany.com'
  smtp_auth_username: 'alerts@yourcompany.com'
  smtp_auth_password: 'your-app-password'

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 0s
    - match:
        service: userauth
      receiver: 'team-receiver'

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'team@yourcompany.com'
        subject: '[ALERT] {{ .GroupLabels.alertname }} — {{ .GroupLabels.service }}'
        body: |
          Alerts:
          {{- range .Alerts }}
          * {{ .Annotations.summary }}: {{ .Annotations.description }}
          {{- end }}

  - name: 'critical-receiver'
    email_configs:
      - to: 'oncall@yourcompany.com'
        subject: '[CRITICAL] {{ .GroupLabels.alertname }} — userauth'
    # Uncomment for Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#alerts-critical'
    #     text: ':rotating_light: {{ .CommonAnnotations.summary }}'

  - name: 'team-receiver'
    email_configs:
      - to: 'dev-team@yourcompany.com'
        subject: '[WARNING] {{ .GroupLabels.alertname }} on userauth'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'alertname']
