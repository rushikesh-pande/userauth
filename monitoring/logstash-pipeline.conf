# Monitoring Enhancement: Logstash Pipeline for userauth
# Receives JSON logs from Filebeat/log file, enriches and sends to Elasticsearch
input {
  beats {
    port => 5044
  }
  # OR directly from file:
  # file {
  #   path => "/logs/userauth.json.log"
  #   start_position => "beginning"
  #   codec => "json"
  # }
}

filter {
  # Parse JSON log entries from Logback JSON encoder
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Add service metadata
  mutate {
    add_field => {
      "service"     => "userauth"
      "environment" => "%{[fields][env]}"
    }
  }

  # Parse timestamp
  date {
    match => ["[@timestamp]", "ISO8601"]
    target => "@timestamp"
  }

  # Extract correlation ID to top-level for easy searching
  if [parsed][correlationId] {
    mutate {
      copy => { "[parsed][correlationId]" => "correlationId" }
    }
  }

  # Tag slow requests (>1000ms)
  if [parsed][elapsed] and [parsed][elapsed] > 1000 {
    mutate {
      add_tag => ["slow_request"]
    }
  }

  # Tag errors
  if [parsed][level] == "ERROR" or [parsed][level] == "WARN" {
    mutate {
      add_tag => ["needs_attention"]
    }
  }
}

output {
  elasticsearch {
    hosts    => ["elasticsearch-userauth:9200"]
    index    => "userauth-logs-%{+YYYY.MM.dd}"
    user     => "elastic"
    password => "changeme"
  }
  # Debug output (remove in production):
  # stdout { codec => rubydebug }
}
