# ─────────────────────────────────────────────────────────────────
#  CD Pipeline — Userauth
#  Triggers: push to main (after CI passes)
#  Steps: build JAR → Docker image → push to GHCR → deploy staging
# ─────────────────────────────────────────────────────────────────
name: CD — Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production ]

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/userauth

jobs:
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: staging
      url: http://staging.userauth.internal:8090

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying userauth to staging..."
          echo "Image: $IMAGE_NAME:${{ github.sha }}"
          # Replace with actual deploy command:
          # kubectl set image deployment/userauth userauth=$IMAGE_NAME:${{ github.sha }}
          # OR: ssh deploy@staging "docker pull $IMAGE_NAME && docker-compose up -d"

      - name: Smoke test
        run: |
          echo "Running smoke test on port 8090..."
          # curl --retry 5 --retry-delay 3 http://staging-host:8090/actuator/health | grep UP

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: http://userauth.internal:8090

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying userauth to production..."
          # kubectl set image deployment/userauth userauth=$IMAGE_NAME:${{ github.sha }}
