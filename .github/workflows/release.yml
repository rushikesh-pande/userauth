# ─────────────────────────────────────────────────────────────────
#  Release Pipeline — Userauth
#  Triggers: push of a version tag  v*.*.*
#  Steps: build → tag Docker image → create GitHub Release
# ─────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/userauth

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Set Maven project version
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build release JAR
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push release Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Userauth ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Userauth ${{ steps.version.outputs.VERSION }}

            ### Docker Image
            ```
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ```

            ### Health Check
            ```
            curl http://localhost:8090/actuator/health
            ```

            ### Prometheus Metrics
            ```
            curl http://localhost:8090/actuator/prometheus
            ```
          files: target/*.jar
          generate_release_notes: true
