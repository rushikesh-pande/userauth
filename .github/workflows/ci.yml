# ─────────────────────────────────────────────────────────────────
#  CI Pipeline — Userauth
#  Triggers: push to any branch, pull_request to main/develop
#  Steps: checkout → Java 17 → Maven cache → build → test → upload
# ─────────────────────────────────────────────────────────────────
name: CI — Build & Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for SonarCloud

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build (skip tests for compile check)
        run: mvn -B compile --no-transfer-progress

      - name: Run unit tests
        run: mvn -B test --no-transfer-progress

      - name: Run integration tests
        run: mvn -B verify -DskipUTs=true --no-transfer-progress
        continue-on-error: true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.sha }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 14

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: userauth-${{ github.sha }}
          path: target/*.jar
          retention-days: 30

  code-coverage:
    name: Code Coverage (JaCoCo)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Generate coverage report
        run: mvn -B verify jacoco:report --no-transfer-progress
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          flags: userauth
          fail_ci_if_error: false
