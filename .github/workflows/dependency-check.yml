# ─────────────────────────────────────────────────────────────────
#  OWASP Dependency Vulnerability Scan — Userauth
#  Runs weekly + on every PR that touches pom.xml
# ─────────────────────────────────────────────────────────────────
name: Dependency Security Scan

on:
  pull_request:
    paths:
      - 'pom.xml'
      - '**/pom.xml'
  schedule:
    - cron: '0 2 * * 0'          # Every Sunday 02:00 UTC
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  owasp-dependency-check:
    name: OWASP NVD Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: owasp-nvd-

      - name: Run OWASP Dependency Check
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionsLocation=.github/owasp-suppressions.xml \
            --no-transfer-progress
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report-${{ github.sha }}
          path: target/dependency-check-report.html
          retention-days: 30

  snyk-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true
