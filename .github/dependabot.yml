# Dependabot configuration — userauth
# Automatically opens PRs to update dependencies.
# See: https://docs.github.com/en/code-security/dependabot

version: 2
updates:

  # ── Maven dependencies ─────────────────────────────────────────
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    reviewers:
      - "rushikesh-pande"
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "deps"
    ignore:
      # Ignore major Spring Boot upgrades (do manually)
      - dependency-name: "org.springframework.boot:spring-boot-starter-parent"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ─────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    reviewers:
      - "rushikesh-pande"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"

  # ── Docker base image ──────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 2
    reviewers:
      - "rushikesh-pande"
    labels:
      - "dependencies"
      - "docker"
